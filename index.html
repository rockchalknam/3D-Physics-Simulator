<!DOCTYPE html>
<html lang="en">

<head>
    <title>Let's Go Herons | Physics Lab</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta charset="UTF-8">
    
    <script src="https://code.jquery.com/jquery-3.3.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/rivets/0.9.6/rivets.bundled.min.js"></script>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.12.9/umd/popper.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/js/bootstrap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/css/toastr.min.css">

    <style>
        body { background: #1a1a1a; color: white; }
        #canvas { width: 100%; max-width: 640px; background: black; display: block; margin: 0 auto; border: 2px solid #444; }
        .lab-container { margin-top: 50px; text-align: center; }
    </style>
</head>

<body>
    <div id="maindiv" class="container lab-container">
        <h1>Let's Go Herons | 3D Physics Lab</h1>
        <hr style="border-color: #444;">

        <div rv-if="data.beforeEmulatorStarted">
            <div class="form-group">
                <label>Select Experiment Module:</label>
                <select id="romselect" class="form-control" style="max-width: 400px; margin: 0 auto;">
                    <option rv-each-rom="data.romList" rv-value="rom.url">{rom.title}</option>
                </select>
            </div>
            
            <button class="btn btn-lg btn-success" onclick="myClass.loadRom()" rv-disabled="data.moduleInitializing">
                { data.moduleInitializing ? 'Initializing Engine...' : 'Run Simulation' }
            </button>
        </div>

        <div id="canvasDiv" style="display:none;">
            <canvas id="canvas"></canvas>
            <div class="mt-3">
                <button class="btn btn-danger" onclick="myApp.reset()">Reset Experiment</button>
                <button class="btn btn-secondary" onclick="myApp.fullscreen()">Fullscreen</button>
            </div>
        </div>
    </div>

    <script>
        window.Module = {
            canvas: null,
            print: console.log,
            printErr: console.error,
            locateFile: function(path) {
                if (path.endsWith(".wasm")) return "n64wasm.wasm";
                return path;
            }
        };
    </script>

    <script src="romlist.js"></script>
    <script src="n64wasm.js"></script>
    <script src="input_controller.js"></script>

    <script src="main.js"></script>

</body>
</html>
