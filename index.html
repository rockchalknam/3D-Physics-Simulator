<!DOCTYPE html>
<html lang="en">

<head>
    <title>Let's Go Herons | Physics Lab</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="keywords" content="NKinematics, Gravity, Physics Engine">
    <meta charset="UTF-8">
    
    <script src="https://code.jquery.com/jquery-3.3.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/rivets/0.9.6/rivets.bundled.min.js"></script>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.12.9/umd/popper.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/js/bootstrap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/css/toastr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.2/dist/FileSaver.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.0/nipplejs.min.js"></script>

    <script>
        // Initial Dark Mode Check
        function getSystemDarkMode(){
            return window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        }
        const darkMode = localStorage.getItem('heron-lab-darkMode');
        if ((darkMode !== null ? darkMode === "true" : getSystemDarkMode())) {
            document.documentElement.dataset.darkmode = "true";
        }
    </script>

    <style>
        input[type="file"] { display: none; }
        .table td, .table th { padding: 8px; vertical-align: middle; }
        #maindiv { padding-top: 30px; }
        .touchsurface { 
            color: #ccc; background: #f8f9fa; width: 100%; height: 400px; 
            border: 2px dashed #ddd; display: flex; align-items: center; justify-content: center; 
        }
        /* Dark Mode */
        [data-darkmode="true"] body { background-color: #121212; color: #eee; }
        [data-darkmode="true"] .card, [data-darkmode="true"] .modal-content { background-color: #1e1e1e; border-color: #444; }
        [data-darkmode="true"] .form-control { background-color: #2b2b2b; color: #fff; }
    </style>
</head>

<body>
    <div id="maindiv" class="container text-center">
        <header class="mb-5">
            <h1 class="display-4">Physics Simulation Lab</h1>
            <p class="lead">Project: Let's Go Herons</p>
        </header>

        <div id="topPanel">
            <div rv-if="data.beforeEmulatorStarted">
                <div class="mb-4">
                    <button id="btnPlayGame" class="btn btn-success btn-lg mx-1" onclick="myClass.loadRom();" 
                        rv-if="data.hasRoms" rv-disabled="data.moduleInitializing">Run Simulation</button>
                    <button id="btnUploadRom" class="btn btn-primary btn-lg mx-1" onclick="myApp.uploadBrowse()">Load Dataset</button>
                    <button type="button" class="btn btn-outline-secondary btn-lg mx-1" onclick="myApp.showRemapModal()">Controls</button>
                </div>

                <div class="form-group mx-auto" style="max-width: 300px;" rv-if="data.hasRoms">
                    <label>Select Project File:</label>
                    <select class="form-control" id="romselect">
                        <option rv-each-rom="data.romList" rv-value="rom.url">{rom.title}</option>
                    </select>
                </div>
            </div>

            <div rv-hide="data.beforeEmulatorStarted">
                <div class="btn-group flex-wrap">
                    <button class="btn btn-danger mx-1" onclick="myApp.newRom()">Stop Lab</button>
                    <button class="btn btn-info mx-1" onclick="myApp.reset()">Reset</button>
                    <button class="btn btn-primary mx-1" onclick="myApp.saveStateLocal()">Quick Save</button>
                    <button class="btn btn-primary mx-1" onclick="myApp.loadStateLocal()" rv-disabled="data.noLocalSave">Quick Load</button>
                    <button class="btn btn-secondary mx-1" onclick="myApp.fullscreen()">Fullscreen</button>
                </div>
            </div>
        </div>

        <div id="middleDiv" class="mt-4">
            <div id="canvasDiv" style="display: none;">
                <canvas id="canvas" style="width: 100%; max-width: 800px; border: 5px solid #333; border-radius: 8px;"></canvas>
            </div>
        </div>

        <input id="file-upload" type="file" />

        <footer class="mt-5 pb-5">
            <hr><p class="text-muted">Core Engine Powered by n64wasm</p>
        </footer>
    </div>

    <div class="modal fade" id="buttonsModal" tabindex="-1" role="dialog">
        <div class="modal-dialog modal-lg" role="document">
            <div class="modal-content">
                <div class="modal-header"><h5>Input Configuration</h5><button type="button" class="close" data-dismiss="modal">&times;</button></div>
                <div class="modal-body">
                    <table class="table table-striped">
                        <thead><tr><th>Signal</th><th>Key</th><th>Action</th></tr></thead>
                        <tbody>
                            <tr rv-each-btn="data.remappableButtons">
                                <th>{btn.name}</th>
                                <td><input rv-value="btn.key" class="form-control form-control-sm" disabled></td>
                                <td><button class="btn btn-sm btn-primary" onclick="myApp.btnRemapKey(this)">Remap</button></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="romlist.js"></script>          <script src="input_controller.js"></script>  <script src="n64wasm.js"></script>          <script src="main.js"></script>             <script>
        // Connect romlist.js data to the App Dashboard
        $(document).ready(function() {
            if (typeof ROMLIST !== 'undefined' && ROMLIST.length > 0) {
                myApp.data.romList = ROMLIST;
                myApp.data.hasRoms = true;
            } else {
                // Manual fallback if romlist.js is missing
                myApp.data.romList = [{ title: "Practice Engine", url: "practice_engine.dat" }];
                myApp.data.hasRoms = true;
            }
        });
    </script>
</body>
</html>
