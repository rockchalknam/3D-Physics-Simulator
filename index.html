<!DOCTYPE html>
<html lang="en">

<head>
    <title>Let's Go Herons | Physics Lab</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="keywords" content="NKinematics, Gravity, Physics Engine">
    <meta charset="UTF-8">
    
    <script src="https://code.jquery.com/jquery-3.3.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/rivets/0.9.6/rivets.bundled.min.js"></script>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.12.9/umd/popper.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/js/bootstrap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/css/toastr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.2/dist/FileSaver.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.0/nipplejs.min.js"></script>

    <script>
        // Initial Dark Mode Check to prevent flash
        function getSystemDarkMode(){
            return window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        }

        const darkMode = localStorage.getItem('heron-lab-darkMode');
        if ((darkMode !== null ? darkMode === "true" : getSystemDarkMode())) {
            document.documentElement.dataset.darkmode = "true";
        }
    </script>

    <style>
        /* Hidden file inputs */
        input[type="file"] { display: none; }

        /* Table Formatting */
        .table td, .table th { padding: 8px; vertical-align: middle; }
        .regularTable td { padding: 0; border: 0; }

        /* Custom Button Styling */
        .start-z-button { background-color: #bdaead; cursor: pointer; border-radius: 4px; padding: 10px; }
        .b-a-button { background-color: #c7c7e6; cursor: pointer; border-radius: 4px; padding: 10px; }
        .buttonhold { background-color: #ff7f50 !important; color: white; }
        
        /* Navigation */
        .nav-tabs .nav-link.active { color: #007bff; font-weight: bold; }
        .githubSvg { height: 21px; width: 21px; fill: currentColor; }

        /* Layout */
        #maindiv { padding-top: 30px; }
        .touchsurface { 
            color: #ccc; 
            background: #f8f9fa;
            width: 100%; 
            height: 400px; 
            border: 2px dashed #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
        }

        /* Dark Mode Theme */
        [data-darkmode="true"] body { background-color: #121212; color: #eee; }
        [data-darkmode="true"] .card, 
        [data-darkmode="true"] .card-body,
        [data-darkmode="true"] .modal-content { background-color: #1e1e1e; color: #fff; border-color: #444; }
        [data-darkmode="true"] .form-control { background-color: #2b2b2b; color: #fff; border-color: #555; }
        [data-darkmode="true"] .touchsurface { background-color: #1a1a1a; color: #555; border-color: #333; }
        [data-darkmode="true"] .start-z-button { background-color: #333; }
        [data-darkmode="true"] .b-a-button { background-color: #444; }
    </style>
</head>

<body>
    <div id="maindiv" class="container text-center">
        <header class="mb-5">
            <h1 class="display-4">Physics Simulation Lab</h1>
            <p class="lead">Project: Let's Go Herons</p>
        </header>

        <div id="topPanel">
            <div rv-if="data.beforeEmulatorStarted">
                <div class="mb-4">
                    <button id="btnPlayGame" class="btn btn-success btn-lg mx-1" onclick="myClass.loadRom();" 
                        rv-if="data.hasRoms" rv-disabled="data.moduleInitializing">Run Simulation</button>
                    <button id="btnUploadRom" class="btn btn-primary btn-lg mx-1" onclick="myApp.uploadBrowse()"
                        rv-disabled="data.moduleInitializing">Load Dataset</button>
                    <button type="button" class="btn btn-outline-secondary btn-lg mx-1" onclick="myApp.showRemapModal()">Controls</button>
                </div>

                <div class="form-check mb-3" rv-if="data.settings.SHOWADVANCED">
                    <label class="form-check-label">
                        <input type="checkbox" class="form-check-input" rv-checked="data.chkAdvanced"> Advanced Configuration
                    </label>
                </div>

                <div class="card mx-auto mb-4" style="max-width: 400px;" rv-if="data.chkAdvanced">
                    <div class="card-body">
                        <h5 class="card-title">Import Parameters</h5>
                        <button class="btn btn-sm btn-secondary btn-block my-2" onclick="myApp.uploadEepBrowse()">Import Save (EEP)</button>
                        <button class="btn btn-sm btn-secondary btn-block my-2" onclick="myApp.uploadSraBrowse()">Import Save (SRA)</button>
                    </div>
                </div>

                <input id="file-upload" type="file" />
                <input id="file-upload-eep" type="file" />
                <input id="file-upload-sra" type="file" />

                <div class="form-group mx-auto" style="max-width: 300px;" rv-if="data.hasRoms">
                    <label>Select Project File:</label>
                    <select class="form-control" id="romselect">
                        <option rv-each-rom="data.romList" rv-value="rom.url">{rom.title}</option>
                    </select>
                </div>
            </div>

            <div rv-hide="data.beforeEmulatorStarted">
                <div class="btn-group flex-wrap">
                    <button class="btn btn-danger mx-1" onclick="myApp.newRom()">Stop Lab</button>
                    <button class="btn btn-info mx-1" onclick="myApp.reset()">Reset</button>
                    <button class="btn btn-primary mx-1" onclick="myApp.saveStateLocal()">Quick Save</button>
                    <button class="btn btn-primary mx-1" onclick="myApp.loadStateLocal()" rv-disabled="data.noLocalSave">Quick Load</button>
                    <button class="btn btn-secondary mx-1" onclick="myApp.fullscreen()">Fullscreen</button>
                </div>
            </div>
        </div>

        <div id="middleDiv" class="mt-4">
            <div id="canvasDiv" style="display: none;">
                <canvas id="canvas" style="width: 100%; max-width: 800px; border: 5px solid #333; border-radius: 8px;"></canvas>
            </div>
            <div id="mydiv"></div>
        </div>

        <footer class="mt-5 pb-5">
            <hr>
            <a href="https://github.com/nbarkhina/n64wasm" target="_blank" class="text-muted d-flex align-items-center justify-content-center">
                <span>Core Engine Source</span>
                <div class="ml-2">
                    <svg viewbox="0 0 98 96" class="githubSvg" xmlns="http://www.w3.org/2000/svg">
                        <path d="M48.854 0C21.839 0 0 22 0 49.217c0 21.756 13.993 40.172 33.405 46.69 2.427.49 3.316-1.059 3.316-2.362 0-1.141-.08-5.052-.08-9.127-13.59 2.934-16.42-5.867-16.42-5.867-2.184-5.704-5.42-7.17-5.42-7.17-4.448-3.015.324-3.015.324-3.015 4.934.326 7.523 5.052 7.523 5.052 4.367 7.496 11.404 5.378 14.235 4.074.404-3.178 1.699-5.378 3.074-6.6-10.839-1.141-22.243-5.378-22.243-24.283 0-5.378 1.94-9.778 5.014-13.2-.485-1.222-2.184-6.275.486-13.038 0 0 4.125-1.304 13.426 5.052a46.97 46.97 0 0 1 12.214-1.63c4.125 0 8.33.571 12.213 1.63 9.302-6.356 13.427-5.052 13.427-5.052 2.67 6.763.97 11.816.485 13.038 3.155 3.422 5.015 7.822 5.015 13.2 0 18.905-11.404 23.06-22.324 24.283 1.78 1.548 3.316 4.481 3.316 9.126 0 6.6-.08 11.897-.08 13.526 0 1.304.89 2.853 3.316 2.364 19.412-6.52 33.405-24.935 33.405-46.691C97.707 22 75.788 0 48.854 0z"/>
                    </svg>
                </div>
            </a>
        </footer>
    </div>

    <div class="modal fade" id="loginModal" tabindex="-1" role="dialog">
        <div class="modal-dialog" role="document">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Lab Technician Login</h5>
                    <button type="button" class="close" data-dismiss="modal">&times;</button>
                </div>
                <div class="modal-body">
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" class="form-control" id="txtPassword" rv-value="data.password" placeholder="Enter Credentials">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-primary" onclick="myApp.loginSubmit()">Access</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="buttonsModal" tabindex="-1" role="dialog">
        <div class="modal-dialog modal-lg" role="document">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Input Configuration</h5>
                    <button type="button" class="close" data-dismiss="modal">&times;</button>
                </div>
                <div class="modal-body">
                    <ul class="nav nav-tabs mb-3">
                        <li class="nav-item">
                            <a class="nav-link" rv-class-active="data.remapPlayer1" onclick="myApp.swapRemap('player1')">Player 1</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" rv-class-active="data.remapOptions" onclick="myApp.swapRemap('options')">System</a>
                        </li>
                    </ul>

                    <div rv-if="data.remapPlayer1">
                        <table class="table table-striped">
                            <thead>
                                <tr>
                                    <th>Signal</th>
                                    <th>Keyboard</th>
                                    <th>Joypad</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr rv-each-btn="data.remappableButtons">
                                    <th>{btn.name}</th>
                                    <td><input rv-value="btn.key" class="form-control form-control-sm" disabled></td>
                                    <td><input rv-value="btn.joy" class="form-control form-control-sm" disabled></td>
                                    <td>
                                        <button class="btn btn-sm btn-primary" onclick="myApp.btnRemapKey(this)">Key</button>
                                        <button class="btn btn-sm btn-secondary" onclick="myApp.btnRemapJoy(this)">Pad</button>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
